<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Charity Sender on OpNet</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #e0f7ff, #c9fffa, #ffffff);
  color: #003d44;
  text-align: center;
  padding: 40px;
}

/* MAIN BOX */
.box {
  background: #ffffffcc;
  backdrop-filter: blur(4px);
  padding: 25px;
  border-radius: 12px;
  width: 380px;
  margin: auto;
  box-shadow: 0 0 20px #00aab030;
  border: 1px solid #a0e4ea;
}

/* inputs + select */
select, input {
  width: 90%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 6px;
  border: 1px solid #88dbe0;
  background: #ffffff;
  color: #005b63;
  font-size: 16px;
}

/* preset buttons */
.preset-box {
  margin-top: 15px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

.preset-btn {
  padding: 8px 14px;
  border-radius: 6px;
  background: #00eaff;
  border: none;
  color: #003d44;
  cursor: pointer;
  font-weight: bold;
  font-size: 14px;
}
.preset-btn:hover { background: #4df6ff; }

/* main buttons */
button.send, button.validate {
  margin-top: 15px;
  padding: 12px 20px;
  background: #00eaff;
  border: none;
  color: #003d44;
  font-weight: bold;
  cursor: pointer;
  border-radius: 6px;
  width: 92%;
  font-size: 16px;
}
button.send:hover, button.validate:hover { background: #4df6ff; }

/* small messages */
.msg {
  min-height: 20px;
  margin-top: 15px;
  color: #007f8a;
  font-size: 14px;
}

/* PROGRESS BAR */
.progress {
  width: 100%;
  background: #bff3f6;
  border-radius: 4px;
  height: 10px;
  margin-top: 20px;
}
.bar {
  height: 10px;
  background: #00eaff;
  width: 0%;
  border-radius: 4px;
  transition: width 1s ease-out;
}

/* POPUP */
.popup {
  position: fixed;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #ffffffdd;
  padding: 20px 30px;
  border-radius: 12px;
  font-size: 20px;
  font-weight: bold;
  color: #007f8a;
  box-shadow: 0 0 20px #00eaff55;
  display: none;
  animation: fade 0.5s ease-out;
}
@keyframes fade {
  from { opacity: 0; transform: translate(-50%, -60%); }
  to   { opacity: 1; transform: translate(-50%, -50%); }
}
</style>
</head>

<body>

<h1 style="color:#005b63;">Charity Sender on OpNet</h1>

<div class="box">

  <!-- CHOOSE ORGANIZATION -->
  <select id="org" onchange="updateAddress()">
    <option value="clean">Clean Water Fund</option>
    <option value="forest">Save the Forest</option>
    <option value="ocean">Ocean Cleanup Initiative</option>
    <option value="animal">Animal Rescue Network</option>
    <option value="edu">Open Education Foundation</option>
  </select>

  <!-- BTC ADDRESS -->
  <input id="addr" placeholder="BTC address will appear here..." />

  <!-- AMOUNT -->
  <input id="amt" type="number" step="0.00000001" placeholder="Amount BTC" />

  <!-- PRESET AMOUNTS -->
  <div class="preset-box">
    <button class="preset-btn" onclick="setAmount(0.0001)">0.0001</button>
    <button class="preset-btn" onclick="setAmount(0.0002)">0.0002</button>
    <button class="preset-btn" onclick="setAmount(0.0005)">0.0005</button>
  </div>

  <!-- ACTION BUTTONS -->
  <button class="validate" onclick="validateAddr()">Validate Address</button>
  <button class="send" onclick="sendBTC()">Send BTC</button>

  <!-- PROGRESS BAR -->
  <div class="progress"><div id="bar" class="bar"></div></div>

  <p id="msg" class="msg"></p>
</div>

<!-- POPUP -->
<div id="popup" class="popup">Thank you! ❤️</div>

<script>
const charityAddresses = {
  clean:  "bc1qcleanfund00000000000000000000000",
  forest: "bc1qforesthelp000000000000000000000",
  ocean:  "bc1qoceanfix00000000000000000000000",
  animal: "bc1qanimalcare00000000000000000000",
  edu:    "bc1qeducation000000000000000000000"
};

window.onload = () => updateAddress();

function updateAddress(){
  const orgKey = document.getElementById('org').value;
  document.getElementById('addr').value = charityAddresses[orgKey];
  msg("Address updated.");
  bar(20);
}

function validateAddr(){
  const a = document.getElementById('addr').value.trim();
  const reg = /^(bc1|[13])[a-zA-HJ-NP-Z0-9]{20,}$/;

  if(reg.test(a)){
    msg("✔ Valid BTC Address");
    bar(50);
    return true;
  } else {
    msg("❌ Invalid BTC Address");
    bar(0);
    return false;
  }
}

function setAmount(x){
  document.getElementById('amt').value = x;
  msg("Amount set.");
  bar(40);
}

function sendBTC(){
  if(!validateAddr()) return;

  const a = document.getElementById('addr').value.trim();
  const amt = document.getElementById('amt').value.trim();

  if(!amt || parseFloat(amt) <= 0){
    msg("Enter a valid amount.");
    return;
  }

  showPopup();

  const link = `bitcoin:${a}?amount=${amt}`;
  msg("Opening wallet…");
  bar(100);

  window.location.href = link;
}

function showPopup(){
  const p = document.getElementById("popup");
  p.style.display = "block";
  setTimeout(() => { p.style.display = "none"; }, 2000);
}

function msg(t){ document.getElementById('msg').innerHTML = t; }
function bar(p){ document.getElementById('bar').style.width = p + "%"; }
</script>

</body>
</html>
